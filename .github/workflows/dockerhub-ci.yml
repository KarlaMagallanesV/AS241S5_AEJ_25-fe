name: Docker Hub
on:
  push:
    branches:
      - develop #Rama principal de desarrollo
      - Spring-WebFlux-SQL #Rama para el desarrollo con Spring WebFlux-SQL
  pull_request:
    branches:
      - develop
      - Spring-WebFlux-SQL
  schedule:
    # Ejecutar todos los días a las 8:00 AM hora Perú (UTC-5) → 1:00 PM UTC
    - cron: '0 13 * * *'
  workflow_dispatch:  # Permite ejecución manual desde GitHub Actions UI

jobs:
  dockerhub:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout del código
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2. Login a Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME_ANYELI }}
          password: ${{ secrets.DOCKERHUB_TOKEN_ANYELI }}

      # 3. Build y Push con tags latest y SHA
      - name: Build and Push Docker Image to Docker Hub
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME_ANYELI }}/as241s5_aej_25-fe:latest
            ${{ secrets.DOCKERHUB_USERNAME_ANYELI }}/as241s5_aej_25-fe:${{ github.sha }}